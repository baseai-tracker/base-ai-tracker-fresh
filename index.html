<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BaseAI Tracker</title>
  <meta name="description" content="AI-Powered Crypto Tracker on Base Network"/>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#a855f7',
            secondary: '#00d4ff',
          },
          boxShadow: {
            'neumorphic': '5px 5px 10px #0a0a0a, -5px -5px 10px #1a1a1a',
            'glow-hover': '0 0 20px rgba(0, 212, 255, 0.6)',
          },
        }
      }
    }
  </script>

  <style>
    body { background: #000; color: #e5e5e5; font-family: system-ui, -apple-system, sans-serif; transition: background 0.3s, color 0.3s; }
    body.light { background: #f8f9fa; color: #1a1a1a; }
    .gradient-bg { background: linear-gradient(135deg, #0a0a0a, #1a1a1a); }
    body.light .gradient-bg { background: linear-gradient(135deg, #e5e7eb, #f3f4f6); }
    .card-neumorphic { background: #111; box-shadow: 5px 5px 10px #0a0a0a, -5px -5px 10px #1a1a1a; transition: all 0.3s ease; }
    body.light .card-neumorphic { background: #ffffff; box-shadow: 5px 5px 15px rgba(0,0,0,0.1), -5px -5px 15px rgba(255,255,255,0.5); }
    .card-neumorphic:hover { box-shadow: 0 0 20px rgba(0,212,255,0.6); transform: translateY(-4px); }
    body.light .card-neumorphic:hover { box-shadow: 0 0 20px rgba(168,85,247,0.4); }
    .snap-x { scroll-snap-type: x mandatory; }
    .snap-center { scroll-snap-align: center; }
    .pie-chart { width: 140px; height: 140px; border-radius: 50%; background: conic-gradient(#00d4ff 0% 40%, #a855f7 40% 70%, #ef4444 70% 100%); }
    .hidden { display: none !important; }
  </style>
</head>
<body class="min-h-screen antialiased dark">

  <!-- Navbar -->
  <nav class="sticky top-0 z-50 bg-black/90 dark:bg-black/90 backdrop-blur-md border-b border-purple-900/40 px-4 sm:px-6 py-4">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <a href="#" class="text-2xl sm:text-3xl font-bold bg-gradient-to-r from-secondary to-primary bg-clip-text text-transparent">BaseAI Tracker</a>
      <div class="flex items-center gap-3 sm:gap-6">
        <input id="searchInput" type="text" placeholder="Search token..." class="hidden sm:block bg-gray-900 border border-purple-600/40 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary w-48 sm:w-64"/>
        <button onclick="toggleTheme()" class="p-2 rounded-full hover:bg-gray-800">
          <span id="themeIcon" class="text-xl">🌙</span>
        </button>
        <button onclick="document.getElementById('walletModal').classList.remove('hidden')" class="bg-primary hover:bg-purple-600 px-5 py-2 rounded-lg font-medium text-sm">Connect Wallet</button>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <section class="gradient-bg py-16 md:py-24 text-center px-4 sm:px-6">
    <h1 class="text-4xl sm:text-5xl md:text-6xl lg:text-7xl font-extrabold bg-gradient-to-r from-secondary to-primary bg-clip-text text-transparent mb-6 leading-tight">
      Your AI-Powered Hub<br/>for Base Network
    </h1>
    <p class="text-lg sm:text-xl md:text-2xl text-gray-300 max-w-4xl mx-auto mb-10">
      Track trending tokens, AI agents, yields & risks in real-time on Coinbase L2 Ethereum
    </p>
    <div class="flex flex-col sm:flex-row justify-center gap-4 sm:gap-6">
      <button onclick="document.getElementById('walletModal').classList.remove('hidden')" class="bg-primary hover:bg-purple-600 px-8 sm:px-10 py-4 sm:py-5 rounded-xl font-bold text-base sm:text-lg shadow-lg">Connect Wallet</button>
      <button onclick="document.getElementById('chatModal').classList.remove('hidden')" class="border-2 border-secondary hover:bg-secondary/20 px-8 sm:px-10 py-4 sm:py-5 rounded-xl font-bold text-base sm:text-lg">Chat with AI</button>
    </div>
  </section>

  <!-- Filters -->
  <section class="py-6 px-4 sm:px-6 max-w-7xl mx-auto">
    <div class="flex flex-wrap justify-center gap-3 sm:gap-4" id="filters">
      <button data-category="all" class="active bg-gray-800 hover:bg-gray-700 px-5 py-2 rounded-full font-medium text-sm border border-purple-600/30">All</button>
      <button data-category="ai" class="bg-gray-800 hover:bg-gray-700 px-5 py-2 rounded-full font-medium text-sm border border-purple-600/30">AI Agents</button>
      <button data-category="meme" class="bg-gray-800 hover:bg-gray-700 px-5 py-2 rounded-full font-medium text-sm border border-purple-600/30">Memecoins</button>
      <button data-category="defi" class="bg-gray-800 hover:bg-gray-700 px-5 py-2 rounded-full font-medium text-sm border border-purple-600/30">DeFi</button>
      <button data-category="new" class="bg-gray-800 hover:bg-gray-700 px-5 py-2 rounded-full font-medium text-sm border border-purple-600/30">New (24h)</button>
    </div>
  </section>

  <!-- Trending Tokens -->
  <section class="py-12 px-4 sm:px-6 max-w-7xl mx-auto" id="trending">
    <h2 class="text-3xl sm:text-4xl md:text-5xl font-bold text-center mb-10 bg-gradient-to-r from-secondary to-primary bg-clip-text text-transparent">Trending Tokens</h2>
