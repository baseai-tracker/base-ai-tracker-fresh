<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BaseAI Tracker</title>
  <meta name="description" content="AI-Powered Crypto Tracker on Base Network"/>

  <!-- RainbowKit styles -->
  <link rel="stylesheet" href="https://unpkg.com/@rainbow-me/rainbowkit@2/styles.css"/>

  <!-- Libraries via CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@tanstack/react-query@5/dist/umd/index.production.min.js"></script>
  <script src="https://unpkg.com/viem@2"></script>
  <script src="https://unpkg.com/wagmi@2"></script>
  <script src="https://unpkg.com/@rainbow-me/rainbowkit@2"></script>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#a855f7',
            secondary: '#00d4ff',
          },
          boxShadow: {
            'neumorphic': '5px 5px 10px #0a0a0a, -5px -5px 10px #1a1a1a',
            'glow-hover': '0 0 20px rgba(0, 212, 255, 0.6)',
          },
        }
      }
    }
  </script>

  <style>
    body { background: #000; color: #e5e5e5; font-family: system-ui, -apple-system, sans-serif; transition: all 0.3s; }
    body.light { background: #f8f9fa; color: #1a1a1a; }
    .gradient-bg { background: linear-gradient(135deg, #0a0a0a, #1a1a1a); }
    body.light .gradient-bg { background: linear-gradient(135deg, #e5e7eb, #f3f4f6); }
    .card-neumorphic { background: #111; box-shadow: 5px 5px 10px #0a0a0a, -5px -5px 10px #1a1a1a; transition: all 0.3s ease; }
    body.light .card-neumorphic { background: #ffffff; box-shadow: 5px 5px 15px rgba(0,0,0,0.1), -5px -5px 15px rgba(255,255,255,0.5); }
    .card-neumorphic:hover { box-shadow: 0 0 20px rgba(0,212,255,0.6); transform: translateY(-4px); }
    body.light .card-neumorphic:hover { box-shadow: 0 0 20px rgba(168,85,247,0.4); }
    .snap-x { scroll-snap-type: x mandatory; }
    .snap-center { scroll-snap-align: center; }
    .pie-chart { width: 140px; height: 140px; border-radius: 50%; background: conic-gradient(#00d4ff 0% 40%, #a855f7 40% 70%, #ef4444 70% 100%); }
    .hidden { display: none !important; }
    .highlight { background-color: #fef08a; color: #000; padding: 0 2px; border-radius: 2px; }
    .loading { animation: spin 1s linear infinite; border: 4px solid #f3f3f3; border-top: 4px solid #00d4ff; border-radius: 50%; width: 40px; height: 40px; margin: 20px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="min-h-screen antialiased dark">

  <div id="root"></div>

  <script type="text/babel">
    const { WagmiProvider, http } = window.Wagmi;
    const { RainbowKitProvider, getDefaultConfig, ConnectButton } = window.RainbowKit;
    const { QueryClient, QueryClientProvider } = window.ReactQuery;
    const { base } = window.Wagmi.chains;

    const config = getDefaultConfig({
      appName: 'BaseAI Tracker',
      projectId: '1ca2482f7aa1c65ad3d2b2e143c89ef4',
      chains: [base],
      transports: { [base.id]: http() },
    });

    const queryClient = new QueryClient();

    // Token data (pairAddress akan diisi otomatis)
    let tokens = [
      { name: "AIXBT", symbol: "AIXBT", price: 0.128, change: 120, vol: "2.1M", mcap: "45M", category: "ai", hype: true, pairAddress: null },
      { name: "BASEMEME", symbol: "BMEME", price: 0.0045, change: -8, vol: "950K", mcap: "12M", category: "meme", hype: false, pairAddress: null },
      { name: "VIRTUALS", symbol: "VIRT", price: 0.67, change: 85, vol: "4.8M", mcap: "120M", category: "ai", hype: true, pairAddress: null },
      { name: "AERO", symbol: "AERO", price: 1.45, change: 32, vol: "6.2M", mcap: "210M", category: "defi", hype: false, pairAddress: null },
      { name: "MOONBASE", symbol: "MOON", price: 0.00012, change: 450, vol: "1.8M", mcap: "8M", category: "meme", hype: true, pairAddress: null },
      { name: "YIELDX", symbol: "YLDX", price: 2.34, change: 15, vol: "3.5M", mcap: "78M", category: "defi", hype: false, pairAddress: null },
      { name: "NEWAI", symbol: "NEWAI", price: 0.089, change: 280, vol: "4.1M", mcap: "35M", category: "new", hype: true, pairAddress: null },
      { name: "DEGENBASE", symbol: "DEGEN", price: 0.0032, change: -12, vol: "890K", mcap: "9M", category: "meme", hype: false, pairAddress: null },
      { name: "PROTOCOLX", symbol: "PROTO", price: 0.456, change: 65, vol: "2.9M", mcap: "65M", category: "ai", hype: true, pairAddress: null }
    ];

    // Fungsi cari pair address otomatis di Base
    async function findPairOnBase(symbol) {
      try {
        const proxy = 'https://api.allorigins.win/raw?url=';
        const url = `https://api.dexscreener.com/latest/dex/search?q=${symbol}`;
        const res = await fetch(proxy + encodeURIComponent(url));
        const data = await res.json();
        
        if (data.pairs && data.pairs.length > 0) {
          const basePairs = data.pairs.filter(p => p.chainId === 'base');
          if (basePairs.length > 0) {
            basePairs.sort((a, b) => (b.volume?.h24 || 0) - (a.volume?.h24 || 0));
            return basePairs[0].pairAddress;
          }
        }
        return null;
      } catch (e) {
        console.log('Error finding pair for ' + symbol + ':', e);
        return null;
      }
    }

    // Auto set pair addresses
    async function autoSetPairAddresses() {
      for (let token of tokens) {
        if (!token.pairAddress) {
          token.pairAddress = await findPairOnBase(token.symbol);
          console.log(`Pair for ${token.symbol}: ${token.pairAddress || 'not found'}`);
        }
      }
      updateRealPrices();
      renderTokens(tokens);
    }

    // Fetch harga live
    async function updateRealPrices() {
      for (let token of tokens) {
        if (token.pairAddress) {
          try {
            const proxy = 'https://api.allorigins.win/raw?url=';
            const url = `https://api.dexscreener.com/latest/dex/pairs/base/${token.pairAddress}`;
            const res = await fetch(proxy + encodeURIComponent(url));
            const data = await res.json();
            if (data.pairs && data.pairs[0]) {
              token.price = parseFloat(data.pairs[0].priceUsd);
              token.change = data.pairs[0].priceChange.h24;
              token.vol = data.pairs[0].volume.h24.toLocaleString();
              token.mcap = data.pairs[0].fdv.toLocaleString();
            }
          } catch (e) {
            console.log('Fetch error for ' + token.name + ':', e);
          }
        }
      }
      renderTokens(tokens);
    }

    // Generate sparkline
    function generateSparkline() {
      const points = [];
      let current = 15;
      for (let i = 0; i < 12; i++) {
        current += (Math.random() - 0.5) * 8;
        points.push(Math.max(5, Math.min(25, current)));
      }
      const isPositive = points[points.length-1] > points[0];
      const color = isPositive ? '#00d4ff' : '#ef4444';
      let pointsStr = '';
      points.forEach((p, i) => pointsStr += `${i * 8.5},${30 - p} `);
      return `<svg class="w-full h-20 mt-3" viewBox="0 0 100 30" preserveAspectRatio="none">
        <polyline points="${pointsStr}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
      </svg>`;
    }

    // Render tokens
    function renderTokens(filtered = tokens, query = '') {
      const grid = document.getElementById('tokenGrid');
      grid.innerHTML = '';
      filtered.forEach(token => {
        let nameDisplay = token.name;
        let symbolDisplay = token.symbol;
        if (query) {
          const regex = new RegExp(`(${query})`, 'gi');
          nameDisplay = token.name.replace(regex, '<span class="highlight">$1</span>');
          symbolDisplay = token.symbol.replace(regex, '<span class="highlight">$1</span>');
        }
        const card = document.createElement('div');
        card.className = 'card-neumorphic rounded-2xl p-6 text-center cursor-pointer';
        card.innerHTML = `
          <div class="w-20 h-20 mx-auto mb-4 bg-gradient-to-br from-primary to-secondary rounded-full flex items-center justify-center text-4xl font-bold shadow-lg">${token.symbol[0]}</div>
          <h3 class="text-2xl font-bold mb-2">${nameDisplay}</h3>
          <p class="text-4xl font-semibold text-secondary mb-2" data-price-symbol="${token.symbol}">$${token.price.toFixed(4)}</p>
          <p class="${token.change > 0 ? 'text-green-400' : 'text-red-400'} text-xl font-medium">${token.change > 0 ? '+' : ''}${token.change}% 24h</p>
          ${generateSparkline()}
          <p class="text-sm text-gray-500 mt-2">Vol: $${token.vol} | MCap: $${token.mcap}</p>
          ${token.hype ? '<span class="mt-3 inline-block bg-secondary/20 text-secondary px-4 py-1 rounded-full text-sm font-medium">AI Hype 🔥</span>' : ''}
        `;
        card.onclick = () => showTokenDetail(token);
        grid.appendChild(card);
      });
    }

    // Search
    document.getElementById('searchInput').addEventListener('input', (e) => {
      const query = e.target.value.toLowerCase().trim();
      const filtered = tokens.filter(t => 
        t.name.toLowerCase().includes(query) || t.symbol.toLowerCase().includes(query)
      );
      renderTokens(filtered, query);
    });

    // Filters
    document.querySelectorAll('#filters button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#filters button').forEach(b => b.classList.remove('active', 'bg-gray-700'));
        btn.classList.add('active', 'bg-gray-700');
        const category = btn.dataset.category;
        let filtered = category === 'all' ? tokens : tokens.filter(t => t.category === category);
        const searchQuery = document.getElementById('searchInput').value.toLowerCase().trim();
        if (searchQuery) {
          filtered = filtered.filter(t => 
            t.name.toLowerCase().includes(searchQuery) || t.symbol.toLowerCase().includes(searchQuery)
          );
        }
        renderTokens(filtered, searchQuery);
      });
    });

    // Portfolio tabs
    function showPortfolioTab(tab) {
      document.getElementById('allocationTab').classList.add('hidden');
      document.getElementById('pnlTab').classList.add('hidden');
      document.getElementById(tab + 'Tab').classList.remove('hidden');
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active', 'bg-gray-700'));
      event.target.classList.add('active', 'bg-gray-700');
    }

    // Token detail
    function showTokenDetail(token) {
      document.getElementById('tokenDetailContent').innerHTML = `
        <h2 class="text-3xl font-bold text-secondary mb-4">${token.name} (${token.symbol})</h2>
        <p class="text-5xl font-bold text-secondary mb-6">$${token.price.toFixed(4)}</p>
        <p class="${token.change > 0 ? 'text-green-400' : 'text-red-400'} text-2xl mb-6">${token.change > 0 ? '+' : ''}${token.change}% 24h</p>
        <div class="bg-gray-800 p-4 rounded-xl mb-6">
          <h4 class="text-xl font-bold mb-3">Candlestick Mock (24h)</h4>
          <svg class="w-full h-48" viewBox="0 0 100 50">
            <rect x="10" y="10" width="10" height="30" fill="#00d4ff" />
            <line x1="15" y1="5" x2="15" y2="40" stroke="#00d4ff" stroke-width="2" />
            <rect x="30" y="20" width="10" height="20" fill="#ef4444" />
            <line x1="35" y1="15" x2="35" y2="45" stroke="#ef4444" stroke-width="2" />
            <rect x="50" y="8" width="10" height="32" fill="#00d4ff" />
            <line x1="55" y1="3" x2="55" y2="42" stroke="#00d4ff" stroke-width="2" />
          </svg>
        </div>
        <div class="grid grid-cols-2 gap-4 text-center">
          <div><strong>Vol:</strong> $${token.vol}</div>
          <div><strong>MCap:</strong> $${token.mcap}</div>
          <div><strong>Category:</strong> ${token.category.toUpperCase()}</div>
          <div><strong>AI Score:</strong> ${Math.floor(Math.random()*30 + 70)}%</div>
        </div>
      `;
      document.getElementById('tokenDetailModal').classList.remove('hidden');
    }

    // Theme toggle
    function toggleTheme() {
      document.body.classList.toggle('light');
      document.body.classList.toggle('dark');
      document.getElementById('themeIcon').textContent = document.body.classList.contains('light') ? '☀️' : '🌙';
      localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
    }

    if (localStorage.getItem('theme') === 'light') {
      document.body.classList.add('light');
      document.body.classList.remove('dark');
      document.getElementById('themeIcon').textContent = '☀️';
    }

    // Chat send
    function sendChatMessage() {
      const input = document.getElementById('chatInput');
      if (input.value.trim()) {
        const content = document.getElementById('chatContent');
        content.innerHTML += `<p class="text-gray-300">You: ${input.value}</p>`;
        setTimeout(() => {
          content.innerHTML += `<p class="text-secondary">AI: Analisa "${input.value}": Bullish 85%, risk medium. Mau detail lebih?</p>`;
          content.scrollTop = content.scrollHeight;
        }, 800);
        input.value = '';
      }
    }

    // Initial setup
    autoSetPairAddresses();
    renderTokens(tokens);

    // Update real prices setiap 30 detik
    setInterval(updateRealPrices, 30000);
  </script>

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</body>
</html>
